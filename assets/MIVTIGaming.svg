<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 555 183">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFD54F"/>
      <stop offset="55%"  stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#FF3D00"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFC533"/>
      <stop offset="100%" stop-color="#FF5A28"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Left wing: main sweep ── -->
  <path d="M 80,40 C 60,26 15,26 6,66 C 2,88 20,106 48,98 L 75,82 C 78,68 80,53 80,40 Z"
        fill="url(#g1)" filter="url(#glow)"/>
  <!-- ── Left wing: lower strip ── -->
  <path d="M 68,104 C 46,112 24,130 30,154 C 34,166 52,161 64,138 L 66,116 Z"
        fill="url(#g1)" opacity="0.78"/>

  <!-- ── Center "i": dot ── -->
  <rect x="91" y="12" width="22" height="22" rx="3" fill="url(#g1)" filter="url(#glow)"/>
  <!-- ── Center "i": stem ── -->
  <rect x="91" y="40" width="22" height="73" fill="url(#g1)"/>

  <!-- ── V shape: left leg ── -->
  <polygon points="73,113 91,113 102,176 84,176" fill="url(#g1)"/>
  <!-- ── V shape: right leg ── -->
  <polygon points="113,113 131,113 120,176 102,176" fill="url(#g1)"/>

  <!-- ── Right wing: main sweep (mirrored about x=102) ── -->
  <path d="M 124,40 C 144,26 189,26 198,66 C 202,88 184,106 156,98 L 129,82 C 126,68 124,53 124,40 Z"
        fill="url(#g1)" filter="url(#glow)"/>
  <!-- ── Right wing: lower strip (mirrored) ── -->
  <path d="M 136,104 C 158,112 180,130 174,154 C 170,166 152,161 140,138 L 138,116 Z"
        fill="url(#g1)" opacity="0.78"/>

  <!-- ── Separator ── -->
  <line x1="220" y1="15" x2="220" y2="173" stroke="rgba(255,197,51,0.28)" stroke-width="1.5"/>

  <!-- ── MIVTI text ── -->
  <text x="240" y="125"
    font-family="Impact, 'Arial Black', Arial, sans-serif"
    font-size="90"
    fill="url(#g2)"
    filter="url(#glow)">MIVTI</text>

  <!-- ── GAMING text ── -->
  <text x="248" y="163"
    font-family="'Arial Narrow', Arial, sans-serif"
    font-size="28"
    font-weight="700"
    fill="#CC7700"
    letter-spacing="12">GAMING</text>
</svg>
